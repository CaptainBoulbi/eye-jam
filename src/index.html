<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye Jam</title>

    <style>

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }


        [scene] {
            animation: fadeIn 1s ease-in;
        }
    </style>
</head>
<body>

    <div scene="presentation">
        <h1>EYE JAM</h1>
        <img 
            src="assets/jam-logo.png" 
            alt="Jam Logo"
            onclick="scene_show('intro')"
            style="cursor: pointer;"
        >
    </div>

    <div scene="intro">
        <h1>Je suis l'intro</h1>
        <button onclick="scene_show('game')">Jouer</button>
    </div>

   
    <div scene="game">
        <h1>Je suis le jeu</h1>
    </div>


    <script>
        function scene_show(name) {
            document.querySelectorAll('[scene]').forEach((scene) => {
                scene.hidden = scene.getAttribute('scene') !== name
            })
        }

        scene_show('presentation')
    </script>

    <script type="module" src="./index.ts"></script>

</body>
</html>
