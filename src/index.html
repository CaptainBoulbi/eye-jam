<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eye Jam</title>

    <style>

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }


        [scene] {
            animation: fadeIn 1s ease-in;
        }

         /*tentative de faire un background qui fait peur dans la scene de presentation*/
        [scene="presentation"] { 
           
           
            background : radial-gradient(circle, #1c1c1c 0%, #0a0a0a 50%, #000000 100%);
            min-height: 100vh;
            margin: 0;
            color: #cccccc;        
            font-family: 'Georgia', serif; 
           
        
        }
    </style>    
</head>
<body>

    <div scene="presentation">

        
        <!--change le logo (taille et emplacement principalement) -->
        <img 
            src="assets/jam-logo.png" 
            alt="Jam Logo"
            style="
            height: 10vw; 
            width: 95vw;"
        >

        <style>
            .container {
                width: 80vw;          /* largeur adaptif a l'ecran */
                height: 90vh;         /* hauteur adaptif a l'ecran */
                border: 1px solid white; /* contour blanc */
                margin: 0 auto;        /* centrage horizontal */
                padding: 20px;         /* espace intérieur */
                justify-content: center;
                align-items: center;
                text-align: center;
                .container button {
                   text-align: center;
                   margin-top: 200px; /* pour pousser le bouton vers le bas */
                }
            }

        </style> 
        
        <div class="container">
            <button 
                onclick="scene_show('intro')"
                style="
                    padding : 40px 40px;
                    font-size: 24px;
                    background: #1a1a1a;
                    color: #7a2f2f;
                    border: 1px solid #333;
                    cursor: pointer;
                "
                > Enter
            
            </button>
        </div>
    </div>

    <div scene="intro">
        <h1>Je suis l'intro</h1>
        <button onclick="scene_show('game')">Jouer</button>
    </div>

   
    <div scene="game">
        <h1>Je suis le jeu</h1>
    </div>


    <script>
        function scene_show(name) {
            document.querySelectorAll('[scene]').forEach((scene) => {
                scene.hidden = scene.getAttribute('scene') !== name
            })
        }

        scene_show('presentation')
    </script>

    <script type="module" src="./index.ts"></script>

</body>
</html>
